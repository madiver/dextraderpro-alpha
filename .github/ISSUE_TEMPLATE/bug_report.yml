name: Bug report
description: Report a reproducible bug in an alpha build
title: "[Bug] "
labels: ["bug", "P2"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please include precise steps and environment details.

  - type: input
    id: version
    attributes:
      label: App version
      description: Example: v0.1.0-alpha.3
      placeholder: v0.1.0-alpha.x
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
    validations:
      required: true

  - type: input
    id: build_sha
    attributes:
      label: Build SHA (if known)
      description: Optional but useful for triage
      placeholder: 40-char git SHA

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or crash details
      description: Paste relevant excerpts only; redact sensitive data.

  - type: textarea
    id: attachments
    attributes:
      label: Screenshots or screen recordings
      description: Drag and drop files here if available.
